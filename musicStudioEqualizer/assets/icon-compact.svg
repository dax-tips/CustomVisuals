<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for neon effect -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="barGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00ccff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a" stroke="url(#neonGradient)" stroke-width="2"/>
  
  <!-- Equalizer bars - compact version -->
  <g transform="translate(25, 25)" filter="url(#neonGlow)">
    <!-- Bars representing audio visualizer -->
    <rect x="0" y="35" width="4" height="15" fill="url(#barGradient)" rx="2"/>
    <rect x="6" y="25" width="4" height="25" fill="url(#barGradient)" rx="2"/>
    <rect x="12" y="20" width="4" height="30" fill="url(#barGradient)" rx="2"/>
    <rect x="18" y="30" width="4" height="20" fill="url(#barGradient)" rx="2"/>
    <rect x="24" y="15" width="4" height="35" fill="url(#barGradient)" rx="2"/>
    <rect x="30" y="28" width="4" height="22" fill="url(#barGradient)" rx="2"/>
    <rect x="36" y="22" width="4" height="28" fill="url(#barGradient)" rx="2"/>
    <rect x="42" y="32" width="4" height="18" fill="url(#barGradient)" rx="2"/>
    <rect x="48" y="18" width="4" height="32" fill="url(#barGradient)" rx="2"/>
  </g>
  
  <!-- Musical note accent -->
  <g transform="translate(70, 70)" filter="url(#neonGlow)">
    <!-- Note stem -->
    <rect x="0" y="-15" width="2" height="12" fill="#00ff88" rx="1"/>
    <!-- Note head -->
    <ellipse cx="1" cy="-3" rx="4" ry="2.5" fill="#00ff88"/>
  </g>
  
  <!-- Text label -->
  <text x="50" y="85" text-anchor="middle" fill="url(#neonGradient)" font-family="Arial, sans-serif" font-size="8" font-weight="bold" filter="url(#neonGlow)">VISUAL</text>
  
</svg>